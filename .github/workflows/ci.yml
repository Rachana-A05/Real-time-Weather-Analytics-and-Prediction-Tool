name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
      - develop
      - dev
      - 'feature/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - development
      - develop
      - dev
      - 'feature/*'
      - 'hotfix/*'

jobs:
  # Main Build: frontend & backend (matrix)
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Build application
        working-directory: ${{ matrix.working-directory }}
        run: |
          if npm run build --if-present 2>/dev/null; then
            echo "Build successful"
          else
            echo "No build script found or build failed - continuing anyway"
          fi
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.working-directory }}
          path: |
            ${{ matrix.working-directory }}/build
            ${{ matrix.working-directory }}/dist
          retention-days: 7

  # Test Stage
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        working-directory: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci
      
      - name: Run unit tests
        working-directory: ${{ matrix.working-directory }}
        run: npm test -- --ci --coverage --maxWorkers=2 || npm test || echo 'No tests'
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.working-directory }}
          path: |
            ${{ matrix.working-directory }}/coverage
            ${{ matrix.working-directory }}/test-results
          retention-days: 7

  # Coverage Stage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        working-directory: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci
      
      - name: Generate coverage report
        working-directory: ${{ matrix.working-directory }}
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov || echo 'No coverage'
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.working-directory }}/coverage/lcov.info
          flags: ${{ matrix.working-directory }}
          name: ${{ matrix.working-directory }}-coverage
          fail_ci_if_error: false
      
      - name: Coverage Summary
        working-directory: ${{ matrix.working-directory }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json
          fi

  # Lint Stage
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        working-directory: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci
      
      - name: Run ESLint
        working-directory: ${{ matrix.working-directory }}
        run: npm run lint || npx eslint . --ext .js,.jsx || echo 'No lint script'
      
      - name: Check code formatting (Prettier)
        working-directory: ${{ matrix.working-directory }}
        run: npx prettier --check "**/*.{js,jsx,json,css,md}" || echo 'Prettier not configured'

  # Security Stage
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend - Install dependencies
        working-directory: backend
        run: npm ci

      - name: Backend - Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate || echo 'Backend audit found issues'

      - name: Frontend - Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend - Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || echo 'Frontend audit found issues'

      - name: Frontend - Security scan with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Deployment Artifact Creation
  create-deployment-artifact:
    name: Create Deployment Artifact
    runs-on: ubuntu-latest
    needs: [test, lint, coverage, security]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Backend
        working-directory: backend
        timeout-minutes: 5
        continue-on-error: true
        run: |
          echo "Starting backend build..."
          npm ci --prefer-offline --no-audit
          npm run build --if-present || echo 'Backend has no build step'
          echo "Backend build completed"

      - name: Build Frontend (with timeout)
        working-directory: frontend
        timeout-minutes: 8
        continue-on-error: true
        run: |
          echo "Starting frontend build..."
          npm ci --prefer-offline --no-audit
          CI=false npm run build 2>&1 || echo "Frontend build completed with status: $?"
          echo "Frontend build finished"

      - name: Create deployment package
        run: |
          echo "Creating deployment package..."
          mkdir -p deployment-package
          
          # Copy backend
          echo "Copying backend files..."
          cp -r backend deployment-package/ 2>/dev/null || echo "Warning: backend copy incomplete"
          
          # Copy frontend build outputs
          echo "Copying frontend files..."
          if [ -d "frontend/build" ]; then
            echo "Found frontend/build"
            cp -r frontend/build deployment-package/frontend-dist || true
          elif [ -d "frontend/dist" ]; then
            echo "Found frontend/dist"
            cp -r frontend/dist deployment-package/frontend-dist || true
          else
            echo "No pre-built frontend found, including source"
            mkdir -p deployment-package/frontend-src
            cp -r frontend/public deployment-package/frontend-src/ 2>/dev/null || true
            cp -r frontend/src deployment-package/frontend-src/ 2>/dev/null || true
          fi
          
          # Copy project files
          echo "Copying project configuration files..."
          cp package.json deployment-package/ 2>/dev/null || true
          cp README.md deployment-package/ 2>/dev/null || true
          
          # Clean node_modules
          echo "Cleaning node_modules..."
          rm -rf deployment-package/backend/node_modules || true
          
          # Create archive
          echo "Creating tar.gz archive..."
          tar -czf deployment-package.tar.gz deployment-package/
          
          # Verify archive
          if [ -f deployment-package.tar.gz ]; then
            echo "Archive created successfully"
            ls -lh deployment-package.tar.gz
          else
            echo "ERROR: Archive creation failed"
            exit 1
          fi

      - name: Upload deployment artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package-${{ github.sha }}
          path: deployment-package.tar.gz
          retention-days: 30

      - name: Generate deployment summary
        if: always()
        run: |
          echo "## Deployment Artifact 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          if [ -f deployment-package.tar.gz ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifact Details ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Name**: deployment-package-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Size**: $(du -h deployment-package.tar.gz | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "- **Retention**: 30 days" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Note ⚠️" >> $GITHUB_STEP_SUMMARY
            echo "Artifact creation encountered issues but tests/linting passed" >> $GITHUB_STEP_SUMMARY
          fi
